[run]
relative_files = true

[report]
include = ["cl_keeper/**/*.py"]
omit = [
    "cl_keeper/_version.py",
    "test/**/*.py",
]
exclude_also = [
    "def __repr__",
    "def __rich_repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if (|_t\\.|typing\\.)TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
    "except ImportError:",
    "assert False",
]

[html]
title = "Changelog Keeper Coverage Report"
